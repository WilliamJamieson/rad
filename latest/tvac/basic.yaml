%YAML 1.1
---
$schema: asdf://stsci.edu/datamodels/roman/schemas/rad_schema-1.0.0
id: asdf://stsci.edu/datamodels/roman/schemas/tvac/basic-2.0.0

title: TVAC Basic Information

type: object
properties:
  # Meta Variables
  calibration_software_version:
    title: Calibration Software Version Number
    description: |
      The version number of the calibration software used in processing this
      file.
    type: string
    sdf:
      special_processing: VALUE_REQUIRED
      source:
        origin: TBD
    archive_catalog:
      datatype: nvarchar(120)
      destination: [WFICommon.calibration_software_version]
  filename:
    title: File Name
    description: |
      The auto-generated name of this file.
    type: string
    sdf:
      special_processing: VALUE_REQUIRED
      source:
        origin: TBD
    archive_catalog:
      datatype: nvarchar(120)
      destination: [WFICommon.filename]
  file_date:
    title: File Creation Date
    description: |
      The date and time this file was created.
    allOf:
      - $ref: http://stsci.edu/schemas/asdf/time/time-1.1.0

    sdf:
      special_processing: VALUE_REQUIRED
      source:
        origin: TBD
    archive_catalog:
      datatype: datetime2
      destination: [WFICommon.filedate]
  model_type:
    title: Data Model Type
    description: |
      The type of data model contained in this file.
    type: string
    sdf:
      special_processing: VALUE_REQUIRED
      source:
        origin: TBD
    archive_catalog:
      datatype: nvarchar(50)
      destination: [WFICommon.model_type]
  origin:
    title: Institution / Organization Name
    description: |
      The name of the institution or organization responsible for creating this
      file.
    type: string
    enum: ["STSCI", "IPAC/SSC"]

    sdf:
      special_processing: VALUE_REQUIRED
      source:
        origin: TBD
    archive_catalog:
      datatype: nvarchar(15)
      destination: [WFICommon.origin]
  prd_software_version:
    title: SOC PRD Version Number
    description: |
      The Science Operations Center (SOC) Project Reference Database (PRD)
      version number used in generating this file.
    type: string
    sdf:
      special_processing: VALUE_REQUIRED
      source:
        origin: TBD
    archive_catalog:
      datatype: nvarchar(120)
      destination: [WFICommon.prd_software_version]
  sdf_software_version:
    title: SDF Version Number
    description: |
      The version number of the Science Data Formatting (SDF) software used in
      generating this file.
    type: string
    sdf:
      special_processing: VALUE_REQUIRED
      source:
        origin: TBD
    archive_catalog:
      datatype: nvarchar(120)
      destination: [WFICommon.sdf_software_version]
  telescope:
    title: Telescope Name
    description: |
      The name of the telescope used to acquire the data.
    type: string
    enum: [ROMAN]

    archive_catalog:
      datatype: nvarchar(5)
      destination: [WFICommon.telescope]
required: [calibration_software_version, filename, file_date,
           model_type, origin, prd_software_version,
           sdf_software_version, telescope]
...
